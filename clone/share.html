  var _silenceCache = {};
  var _sharedAudioCtx = null;
  function _audioCtx() {
    if (!_sharedAudioCtx) {
      var C = window.AudioContext || window.webkitAudioContext;
      if (!C) return null;
      _sharedAudioCtx = new C();
    }
    return _sharedAudioCtx;
  }
  function _findSpeechStart(buf) {
    var THRESH = 0.02; var LEAD_MS = 50;
    var sr = buf.sampleRate;
    var winSize = Math.max(1, Math.floor(sr * 0.01));
    var ch0 = buf.getChannelData(0);
    for (var i = 0; i + winSize <= ch0.length; i += winSize) {
      var peak = 0;
      for (var j = 0; j < winSize; j++) {
        var v = Math.abs(ch0[i + j]);
        if (v > peak) peak = v;
      }
      if (peak >= THRESH) return Math.max(0, i / sr - LEAD_MS / 1000);
    }
    return 0;
  }
  function _prepareTrimmed(cacheKey, url, onReady) {
    if (_silenceCache[cacheKey]) { onReady(_silenceCache[cacheKey]); return; }
    var ctx = _audioCtx();
    if (!ctx) { onReady({ blobUrl: url, offsetSec: 0 }); return; }
    fetch(url).then(function(r) { return r.blob(); }).then(function(blob) {
      var blobUrl = URL.createObjectURL(blob);
      blob.arrayBuffer().then(function(ab) {
        ctx.decodeAudioData(ab.slice(0), function(buf) {
          var off = _findSpeechStart(buf);
          _silenceCache[cacheKey] = { blobUrl: blobUrl, offsetSec: off };
          onReady(_silenceCache[cacheKey]);
        }, function() {
          _silenceCache[cacheKey] = { blobUrl: blobUrl, offsetSec: 0 };
          onReady(_silenceCache[cacheKey]);
        });
      });
    }).catch(function() { onReady({ blobUrl: url, offsetSec: 0 }); });
  }

  // Per-word listen counter — track how many times the teacher has played
  // the recording in this session. On the 2nd+ listen we nudge them toward
  // re-recording via a bouncing mic button + speech bubble. Counter resets
  // when a fresh recording is uploaded for that word. Amitai 2026-04-24 17:00.
  var _listenCounts = {};
  function _nudgeRerecord(rowEl) {
    if (!rowEl) return;
    var recBtn = rowEl.querySelector('.rec-btn');
    if (!recBtn) return;
    // New nudge always supersedes any prior one (on this row or elsewhere).
    document.querySelectorAll('.rerec-nudge').forEach(function(n) { n.remove(); });
    document.querySelectorAll('.rec-btn.rerec-emphasize').forEach(function(b) { b.classList.remove('rerec-emphasize'); });
    // Static enlargement (no bounce) — keep the mic obviously tappable while
    // the nudge is up (Amitai 2026-04-25 02:00).
    recBtn.classList.add('rerec-emphasize');
    var bubble = document.createElement('span');
    bubble.className = 'rerec-nudge';
    bubble.textContent = '🎤 הקלט שוב';
    rowEl.appendChild(bubble);
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { bubble.classList.add('show'); });
    });
    // Auto-fade after 6s (Amitai 2026-04-25 00:28 "מופיע ל6 שניות ונעלם").
    // Mic shrinks back to normal when the bubble goes away.
    setTimeout(function() {
      bubble.classList.remove('show');
      setTimeout(function() { if (bubble.parentNode) bubble.parentNode.removeChild(bubble); }, 300);
      recBtn.classList.remove('rerec-emphasize');
    }, 6000);
  }
  function openPlayerPanel(rowEl, wordKey) {
    closePlayerPanel();
    // Don't open player while recording is in progress — keeps one panel per row
    if (REC) { showToast('סיים את ההקלטה קודם'); return; }
    // Track listen count; nudge toward re-record on 2nd+ listen (per-lang).
    var _listenKey = (wordKey || '') + '|' + LANG;
    _listenCounts[_listenKey] = (_listenCounts[_listenKey] || 0) + 1;
    if (_listenCounts[_listenKey] >= 2) {
      setTimeout(function() { _nudgeRerecord(rowEl); }, 250);
    }
    var url = '/plonter/api/vocab_share_api.php?action=play&t=' + encodeURIComponent(TOKEN) +
              '&word_key=' + encodeURIComponent(wordKey) +
              '&lang=' + encodeURIComponent(LANG) +
              (IS_GROUP && CURRENT_CAT_OBJ ? '&category=' + encodeURIComponent(CURRENT_CAT_OBJ.name) : '');
    var panel = document.createElement('div');
    panel.className = 'player-panel';
    panel.innerHTML =
      '<button type="button" class="pp-btn" data-a="toggle" title="השמע">▶</button>' +
      '<span class="pp-time" data-a="cur">0:00</span>' +
      '<input type="range" class="pp-seek" data-a="seek" min="0" max="1000" value="0" step="1">' +
      '<span class="pp-time" data-a="dur">--:--</span>' +
      '<button type="button" class="pp-btn" data-a="close" title="סגור" style="font-size:1.3em;line-height:1">−</button>';
    rowEl.parentNode.insertBefore(panel, rowEl.nextSibling);

    var audio = new Audio();
    audio.preload = 'auto';
    // Apply current sequence speed from frame-0 so every clip plays at the
    // chosen rate end-to-end (Amitai 2026-04-25 02:10 "הקצב על כל המילים").
    try { audio.playbackRate = SEQ_SPEED; } catch (_) {}
    audio.src = url;
    audio.play().then(function() { toggleBtn.textContent = '⏸'; }).catch(function() {
      toggleBtn.textContent = '▶';
      showToast('לחץ שוב להשמעה');
    });
    var trimOffset = 0;
    var _cacheKey = TOKEN + '|' + LANG + '|' + (IS_GROUP && CURRENT_CAT_OBJ ? CURRENT_CAT_OBJ.name + '|' : '') + wordKey;
    if (SEQ_PLAY) _prepareTrimmed(_cacheKey, url, function(prep) {
      // Stop-sequence guard (Amitai 2026-04-27 D): if user pressed stop while
      // we were async-prepping the trimmed blob, PLAYER has been nulled or
      // replaced. Bail to avoid ghost-play with no UI panel.
      if (!PLAYER || PLAYER.audio !== audio) return;
      trimOffset = prep.offsetSec || 0;
      audio.pause();
      audio.src = prep.blobUrl;
      audio.addEventListener('loadedmetadata', function _trimOnce() {
        audio.removeEventListener('loadedmetadata', _trimOnce);
        if (!PLAYER || PLAYER.audio !== audio) return;
        try { audio.currentTime = trimOffset; } catch (_) {}
        try { audio.playbackRate = SEQ_SPEED; } catch (_) {}
        audio.play().then(function() { toggleBtn.textContent = '⏸'; })
                    .catch(function() {});
      });
    });

    var toggleBtn = panel.querySelector('[data-a="toggle"]');
    var curEl = panel.querySelector('[data-a="cur"]');
    var durEl = panel.querySelector('[data-a="dur"]');
    var seekEl = panel.querySelector('[data-a="seek"]');
    var closeBtn = panel.querySelector('[data-a="close"]');
    var seeking = false;

    audio.addEventListener('loadedmetadata', function() {
      if (isFinite(audio.duration) && audio.duration > 0) durEl.textContent = fmtMs(audio.duration * 1000);
    });
    audio.addEventListener('timeupdate', function() {
      if (seeking) return;
      curEl.textContent = fmtMs(audio.currentTime * 1000);
      if (isFinite(audio.duration) && audio.duration > 0) {
        seekEl.value = Math.floor((audio.currentTime / audio.duration) * 1000);
      }
    });
    audio.addEventListener('ended', function() { toggleBtn.textContent = '▶'; });
    // Lock the rest of the UI while audio is actively playing (Amitai 17:12
    // "אי אפשר להפעיל כלום כשבודקים הקלטה עד שהניגון נעצר"). Pause/ended
    // release the lock; the player panel's own controls stay clickable.
    audio.addEventListener('play',  function() { document.body.classList.add('audio-playing'); });
    audio.addEventListener('pause', function() { document.body.classList.remove('audio-playing'); });
    audio.addEventListener('ended', function() { document.body.classList.remove('audio-playing'); });

    toggleBtn.onclick = function() {
      if (audio.paused) { audio.play().catch(function(){}); toggleBtn.textContent = '⏸'; }
      else { audio.pause(); toggleBtn.textContent = '▶'; }
    };
    seekEl.addEventListener('input', function() {
      seeking = true;
      if (isFinite(audio.duration) && audio.duration > 0) {
        curEl.textContent = fmtMs(audio.duration * parseInt(seekEl.value, 10) / 1000 * 1000);
      }
    });
    seekEl.addEventListener('change', function() {
      if (isFinite(audio.duration) && audio.duration > 0) {
        audio.currentTime = audio.duration * parseInt(seekEl.value, 10) / 1000;
      }
      seeking = false;
    });
    closeBtn.onclick = function() { closePlayerPanel(); };

    PLAYER = { audio: audio, panel: panel, rowEl: rowEl };
  }

  function uploadClip(blob, wordKey, btn, rowEl) {
    showToast('מעלה הקלטה…');
    // Capture pre-upload state so we can decide whether this was a NEW
    // recording (auto-scroll to next unrecorded word) or an OVERWRITE
    // for corrections (Amitai 2026-04-25 22:37 — don't yank focus while
    // the teacher is fixing existing recordings).
    var _wasOverwrite = !!rowEl.querySelector('.play-btn');
    var recName = '';
    try { recName = localStorage.getItem(NAME_KEY) || ''; } catch (_) {}
    var fd = new FormData();
    fd.append('share_token', TOKEN);
    fd.append('word_key', wordKey);
    fd.append('recorder_name', recName);
    fd.append('lang', LANG);
    if (IS_GROUP && CURRENT_CAT_OBJ) fd.append('category', CURRENT_CAT_OBJ.name);
    fd.append('audio', blob, 'clip.webm');
    fetch('/plonter/api/vocab_share_api.php?action=upload', { method: 'POST', body: fd })
      .then(function(r) { return r.json(); })
      .then(function(j) {
        if (!j.success) return showToast('שגיאה: ' + (j.error || 'unknown'), 3500);
        btn.classList.add('done');
        btn.title = 'הקלט מחדש';
        // Add ▶ play button if missing — recipient can now verify what they recorded.
        if (!rowEl.querySelector('.play-btn')) {
          var playBtn = document.createElement('button');
          playBtn.className = 'play-btn';
          playBtn.setAttribute('data-action', 'play');
          playBtn.title = 'השמע הקלטה';
          playBtn.textContent = '▶️';
          playBtn.onclick = function() { openPlayerPanel(rowEl, wordKey); };
          rowEl.insertBefore(playBtn, btn);
        }
        var ownerLabel = recName ? ('הוקלט ע״י ' + recName) : 'הוקלט ע״י לא ידוע';
        var ownerEl = rowEl.querySelector('.recording-owner');
        if (!ownerEl) {
          ownerEl = document.createElement('span');
          ownerEl.className = 'recording-owner';
          rowEl.insertBefore(ownerEl, btn);
        }
        ownerEl.textContent = ownerLabel;
        ownerEl.title = ownerLabel;
        if (!rowEl.querySelector('.has-recording-badge')) {
          var badge = document.createElement('span');
          badge.className = 'has-recording-badge';
          badge.title = 'נשלחה הקלטה';
          badge.textContent = '✓';
          rowEl.appendChild(badge);
        }
        showToast('✅ הוקלט');
        delete _silenceCache[TOKEN + '|' + LANG + '|' + (IS_GROUP && CURRENT_CAT_OBJ ? CURRENT_CAT_OBJ.name + '|' : '') + wordKey];
        // Re-recording means the teacher acted on the nudge (or just did it
        // naturally); reset their listen counter so we don't nudge again
        // after a single listen of the NEW recording.
        _listenCounts[(wordKey || '') + '|' + LANG] = 0;
        // Mirror the new recording into the in-memory INFO so switching tabs later
        // still reflects that we've already recorded this word in this language.
        if (INFO) {
          if (!INFO.existing_by_lang) INFO.existing_by_lang = { ar: [], he: [] };
          if (!INFO.existing_by_lang[LANG]) INFO.existing_by_lang[LANG] = [];
          if (INFO.existing_by_lang[LANG].indexOf(wordKey) === -1) {
            INFO.existing_by_lang[LANG].push(wordKey);
          }
          if (!INFO.existing_names_by_lang) INFO.existing_names_by_lang = { ar: {}, he: {} };
          if (!INFO.existing_names_by_lang[LANG]) INFO.existing_names_by_lang[LANG] = {};
          INFO.existing_names_by_lang[LANG][wordKey] = recName || '';
        }
        _applyRecButtonStatus(btn, wordKey);
        _updateProgress();
        // Show 'הקלט שוב' nudge immediately so the teacher knows the mic is
        // still the tap-target if they want to redo — no need to wait for them
        // to listen first. Amitai 2026-04-24 18:23.
        setTimeout(function() { _nudgeRerecord(rowEl); }, 350);
        // Encouragement bubble — fires BEFORE the player auto-opens so the
        // teacher sees it on the main list. Skipped at 100% since the all-done
        // celebration modal takes over. Amitai 2026-04-24 16:41.
        var _rowsNow = document.querySelectorAll('.word-row');
        var _totalEnc = _rowsNow.length;
        var _doneEnc = 0;
        _rowsNow.forEach(function(r) { if (r.querySelector('.play-btn')) _doneEnc++; });
        var _pctEnc = _totalEnc ? Math.round((_doneEnc / _totalEnc) * 100) : 0;
        if (_doneEnc < _totalEnc) {
          var _encMsg = _pickEncouragement(_pctEnc, _doneEnc, _totalEnc);
          if (_encMsg) showEncouragement(_encMsg);
        }
        setTimeout(function() { openPlayerPanel(rowEl, wordKey); }, 300);
        if (!_wasOverwrite) {
          setTimeout(_scrollToNextUnrecorded, 1400);
        }
        setTimeout(_updateJumpToNextBtn, 1500);
      })
      .catch(function(e) { showToast('שגיאת רשת: ' + e.message, 3500); });
  }

  // PRACTICE_SHARE_RESOLVE_20260604 — a content_share (practice) link reuses the
  // same ?t= param as the recording-share flow. Try the generic content_share_api
  // FIRST: if the token resolves to a shared item, send the recipient straight
  // into practice mode (no account needed). Distinguish by error text — only an
  // unknown token ("לא קיים") falls through to the existing vocab_share recording
  // flow; an expired/revoked content-share shows a friendly RTL message instead.
  // If the generic API is unreachable, fall through so recording links still work.
  (function bootShare() {
    if (!TOKEN) { loadInfo(); return; }
    // Share token goes as `t` (never `token`, which the backend reads as the
    // session token for email-bound shares). Carry the logged-in session as a
    // Bearer header so the backend can match an email invite to the caller.
    var _authTok = '';
    try { _authTok = localStorage.getItem('plonter_auth_token') || ''; } catch (_) {}
    var _hdrs = {};
    if (_authTok) _hdrs['Authorization'] = 'Bearer ' + _authTok;
    fetch('/plonter/api/content_share_api.php?action=resolve_link&t=' + encodeURIComponent(TOKEN), { headers: _hdrs })
      .then(function(r) { return r.json(); })
      .then(function(j) {
        if (j && j.success && j.content) {
          var c = j.content;
          var role = j.role || 'view';
          // SHARE_FIX1_20260606 — route the recipient by content_type. Previously EVERY
          // non-vocab type fell through to vocab.html, so a lesson/syntax/hindus/text view
          // link wrongly opened אוצם (Amitai hit this live). Now each type routes to its own
          // view, carrying &share=<TOKEN>&role=<role> (+title/cid when present) like the
          // vocab case. NOTE: only vocab_category has a real deep-open-by-title hook today
          // (vocab.html?cat=). The other types land on their correct view/home in the unified
          // index — the per-type deep-open-BY-ID inside the core app is deferred (per @6m); the
          // share/type/cid params are passed so that future core hook can pick the item up.
          var _q = 'share=' + encodeURIComponent(TOKEN) + '&role=' + encodeURIComponent(role);
          var _title = (c.title != null && c.title !== '') ? ('&title=' + encodeURIComponent(c.title)) : '';
          var _cid = (c.id != null && c.id !== '') ? ('&cid=' + encodeURIComponent(c.id)) : '';
          switch (c.content_type) {
            case 'vocab_category':
              // REAL deep-open (unchanged): vocab.html imports the category by title.
              if (c.title) {
                location.replace('vocab.html?cat=' + encodeURIComponent(c.title) + '&' + _q);
              } else {
                location.replace('vocab.html?' + _q);
              }
              return;
            case 'lesson':
              // Lessons view (default welcome tab of the unified index). TODO(core-hook):
              // index.html should consume ?type/cid/share to deep-open the lesson by id in
              // view mode. (The legacy ?lesson=<code> path uses the lesson share-CODE, not the
              // content_share token, so it can't reuse this token.) Lands on Plonter, NOT vocab.
              location.replace('index.html?type=lesson&' + _q + _title + _cid);
              return;
            case 'sentence':
            case 'analysis':
            case 'verb_analysis':
              // Syntax app (the main unified index). TODO(core-hook): load this sentence by id in view mode.
              location.replace('index.html?type=' + encodeURIComponent(c.content_type) + '&' + _q + _title + _cid);
              return;
            case 'hindus':
              // Hindus mode/welcome tab. TODO(core-hook): open this hindus item by id in view mode.
              location.replace('index.html?type=hindus&' + _q + _title + _cid);
              return;
            case 'text':
            case 'texts':
              // Texts view. TODO(core-hook): open this text by id in view mode.
              location.replace('index.html?type=text&' + _q + _title + _cid);
              return;
            case 'media':
              // Future media-store viewer (media (store,id) bridge). TODO(core-hook): media item viewer.
              location.replace('index.html?type=media&' + _q + _title + _cid);
              return;
            default:
              // Unknown/other type → safe app HOME (the unified index), NEVER vocab.html.
              location.replace('index.html?' + _q + _title);
              return;
          }
        }
        // Email-bound invite: not logged in (need_login) or wrong account (mismatch).
        if (j && j.success && j.valid === false && (j.need_login || j.mismatch)) {
          _emailShareGate(j);
          return;
        }
        var err = (j && j.error) || '';
        if (err.indexOf('לא קיים') !== -1) { loadInfo(); return; } // unknown token -> recording flow
        _practiceShareInvalid(err);                                // known but expired/revoked
      })
      .catch(function() { loadInfo(); });
  })();

  // EMAIL_SHARE_LOGIN_GATE_20260606 — an email-bound content_share requires the
  // recipient to log in with the invited address. Render the AuthEmail widget
  // (loaded on demand), prefill the invited email, and on a successful login
  // reload share.html?t=<token> so bootShare re-resolves with the new session.
  function _loadAuthWidget(cb) {
    if (typeof AuthEmail !== 'undefined') { cb(); return; }
    var s = document.createElement('script');
    s.src = 'js/auth_widget.js';
    s.onload = function() { cb(); };
    s.onerror = function() { renderError('שגיאה בטעינת מסך ההתחברות. נסו שוב מאוחר יותר.'); };
    document.head.appendChild(s);
  }

  function _emailShareGate(j) {
    var inviteEmail = j.invite_email || '';
    var mismatch = !!j.mismatch;
    var title = j.title || '';
    var intro = mismatch
      ? '<p style="color:#b91c1c;font-weight:600">' + escapeHtml(j.message || ('ההזמנה מיועדת ל-' + inviteEmail + ', התחבר עם אותה כתובת')) + '</p>' +
        '<p style="color:#475569;font-size:0.92em">התחבר עם הכתובת <b dir="ltr">' + escapeHtml(inviteEmail) + '</b> כדי לגשת לתוכן.</p>'
      : '<p style="color:#475569">הוזמנת לתוכן משותף' + (title ? ' — <b>' + escapeHtml(title) + '</b>' : '') + '.</p>' +
        '<p style="color:#475569;font-size:0.92em">התחבר או הירשם עם הכתובת <b dir="ltr">' + escapeHtml(inviteEmail) + '</b> כדי לגשת אליו.</p>';

    main.innerHTML =
      '<header><h1>הזמנה לתוכן משותף 📨</h1></header>' +
      '<div class="card" style="text-align:right">' + intro +
        (mismatch ? '<button id="email-share-switch" class="btn-primary" style="margin-bottom:8px">התחבר עם כתובת אחרת</button>' : '') +
        '<div id="email-share-auth"></div>' +
      '</div>';

    function mountWidget() {
      _loadAuthWidget(function() {
        AuthEmail.init({
          container: '#email-share-auth',
          apiUrl: '/plonter/api/auth_email.php',
          title: 'התחברות',
          onGuest: function() { AuthEmail.showLogin(); },   // no guest path — force login
          onLogin: function() {
            // Re-resolve with the new session: reload this page with the token.
            location.replace('share.html?t=' + encodeURIComponent(TOKEN));
          }
        });
        // Prefill the invited email into the login (and register) field. The
        // widget may render the field synchronously OR after an async session
        // check, and re-renders on login<->register, so drive the prefill from
        // a MutationObserver on the auth container — it fires the moment the
        // #auth-email field (re)appears.
        if (inviteEmail) {
          var _authBox = document.getElementById('email-share-auth');
          function _prefill() {
            var f = document.getElementById('auth-email');
            if (f && f.value !== inviteEmail) { f.value = inviteEmail; }
          }
          _prefill();
          if (_authBox && window.MutationObserver) {
            new MutationObserver(_prefill).observe(_authBox, { childList: true, subtree: true });
          }
        }
      });
    }

    if (mismatch) {
      // Caller is logged in with the wrong account — drop that session first so
      // they can authenticate as the invitee.
      var sw = document.getElementById('email-share-switch');
      if (sw) sw.onclick = function() {
        try {
          if (typeof AuthEmail !== 'undefined' && AuthEmail.logout) { AuthEmail.logout(); }
          else { localStorage.removeItem('plonter_auth_token'); localStorage.removeItem('plonter_auth_token_user'); }
        } catch (_) {}
        sw.style.display = 'none';
        mountWidget();
      };
    } else {
      mountWidget();
    }
  }

  function _practiceShareInvalid(err) {
    if (!main) return;
    main.innerHTML = '<div dir="rtl" style="max-width:420px;margin:48px auto;padding:24px;background:#fff;border-radius:16px;text-align:center;font-family:inherit;box-shadow:0 8px 30px rgba(0,0,0,0.12)">' +
      '<div style="font-size:2.4em">🔒</div>' +
      '<h2 style="color:#0d9488;margin:8px 0">הקישור אינו זמין</h2>' +
      '<p style="color:#475569">' + (err || 'הקישור לתרגול בוטל או שפג תוקפו.') + '</p>' +
      '<a href="vocab.html" style="display:inline-block;margin-top:10px;padding:11px 18px;background:#0d9488;color:#fff;border-radius:10px;text-decoration:none;font-weight:bold">לאתר פלונטר</a>' +
      '</div>';
  }

  // ===== INPAGE_SHARE_DIALOG_20260524 =====
  // In-page port of vocab.html's share-link ("give others access to record")
  // dialog so it opens as an overlay ON share.html — no navigation to
  // vocab.html (which flashed the home screen first; Amitai 2026-05-24).
  // Ported from the live vocab.html openShareLinkDialog / createShareLink /
  // refreshShareTokensList family. Adaptations: owner token from
  // localStorage.plonter_auth_token; category from INFO.category / CATEGORY_NAME;
  // words from INFO.words; share.html showToast; PROGRAMMATIC wiring (share.html
  // script is an IIFE, so inline onclick handlers would not resolve).
  var _shareDialogCat = '';
  var _activeTokenForDialogCat = null;
  var _lastShareUrl = '';
  var _lastShareCat = '';
  var _skipActiveLinkConfirm = false;

  function _ownerAuthToken() {
    try { return localStorage.getItem('plonter_auth_token') || ''; } catch (_) { return ''; }
  }
  function _shareBaseUrl() {
    return location.origin + location.pathname.replace(/[^\/]*$/, '');
  }
  function _shareWordsForCurrentCat() {
    var ws = (INFO && INFO.words) ? INFO.words : [];
    return ws.map(function(w) { return { arabic: w.arabic || '', form: w.form || '', hebrew: w.hebrew || '' }; });
  }
  function _shareEsc(s) {
    return String(s).replace(/[&<>"]/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; });
  }

  function openShareLinkDialog(catNameArg) {
    var catName = catNameArg || (INFO && INFO.category) || CATEGORY_NAME || '';
    if (!catName) { showToast('לא נמצאה קטגוריה'); return; }
    var token = _ownerAuthToken();
    if (!token) { showToast('יש להתחבר כדי לייצר קישור שיתוף'); return; }
    _shareDialogCat = catName;
    var overlay = document.getElementById('share-link-overlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'share-link-overlay';
      overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100000;backdrop-filter:blur(4px);display:none';
      overlay.onclick = function(e) { if (e.target === overlay) closeShareLinkDialog(); };
      overlay.innerHTML =
        '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:white;border-radius:16px;padding:24px;max-width:480px;width:92%;max-height:88vh;overflow-y:auto;direction:rtl;text-align:right">' +
          '<button id="share-close-btn" type="button" style="position:absolute;top:12px;left:12px;background:none;border:none;font-size:1.3em;cursor:pointer;color:#6b7280">✕</button>' +
          '<h3 style="color:#7c3aed;margin:0 0 14px;font-size:1.15em">🎤 קישור להקלטה שיתופית</h3>' +
          '<div style="font-size:0.9em;color:#6b7280;line-height:1.55;margin-bottom:14px">מי שייכנס לקישור יוכל להקליט את המילים בקטגוריה <span id="share-link-cat" style="color:#0d9488;font-weight:bold"></span>. ההקלטות נשמרות אצלך.</div>' +
          '<div id="share-link-existing-active" style="display:none;margin-bottom:14px;padding:10px 12px;background:#dcfce7;border:1.5px solid #16a34a;border-radius:10px">' +
            '<div style="font-size:0.85em;color:#166534;margin-bottom:6px;font-weight:bold">✅ יש כבר קישור פעיל לקטגוריה זו:</div>' +
            '<div id="share-link-existing-url" style="font-family:monospace;font-size:0.78em;background:white;padding:6px 8px;border-radius:6px;direction:ltr;text-align:left;word-break:break-all;margin-bottom:8px"></div>' +
            '<div style="font-size:0.75em;color:#6b7280;margin-bottom:8px" id="share-link-existing-meta"></div>' +
            '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
              '<button id="share-link-existing-copy" type="button" style="padding:6px 12px;background:#16a34a;color:white;border:none;border-radius:6px;cursor:pointer;font-size:0.85em;font-weight:bold">📋 השתמש בקיים</button>' +
              '<button id="share-link-existing-wa" type="button" style="padding:6px 12px;background:#dcfce7;color:#15803d;border:1px solid #15803d;border-radius:6px;cursor:pointer;font-size:0.85em">💬 וואטסאפ</button>' +
            '</div>' +
          '</div>' +
          '<div style="margin-bottom:12px"><label style="font-weight:bold;display:block;margin-bottom:6px">תוקף הקישור</label>' +
            '<div id="share-ttl-choices" style="display:flex;gap:8px;flex-wrap:wrap">' +
              '<label class="ttl-choice"><input type="radio" name="share-ttl" value="1"> שעה</label>' +
              '<label class="ttl-choice"><input type="radio" name="share-ttl" value="24" checked> יממה</label>' +
              '<label class="ttl-choice"><input type="radio" name="share-ttl" value="168"> שבוע</label>' +
              '<label class="ttl-choice"><input type="radio" name="share-ttl" value="720"> חודש</label>' +
            '</div>' +
          '</div>' +
          '<button id="share-create-btn" type="button" style="padding:10px 24px;background:#7c3aed;color:white;border:none;border-radius:10px;cursor:pointer;font-weight:bold;font-size:0.95em;width:100%">🎤 צור קישור הקלטה</button>' +
          '<div id="share-link-result" style="display:none;margin-top:14px;padding:12px;background:#f5f3ff;border:1.5px solid #ddd6fe;border-radius:10px">' +
            '<div style="font-size:0.85em;color:#6b7280;margin-bottom:6px">קישור מוכן — שתפו אותו:</div>' +
            '<div id="share-link-url" style="background:white;padding:10px;border-radius:6px;word-break:break-all;font-family:monospace;font-size:0.85em;margin-bottom:10px;direction:ltr;text-align:left"></div>' +
            '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
              '<button id="share-result-copy" type="button" style="padding:8px 14px;background:#7c3aed;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:0.9em">📋 העתק</button>' +
              '<button id="share-result-wa" type="button" style="padding:8px 14px;background:#25D366;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:0.9em">💬 שלח בוואטסאפ</button>' +
            '</div>' +
            '<div style="font-size:0.8em;color:#6b7280;margin-top:8px" id="share-link-expires"></div>' +
          '</div>' +
          '<div style="margin-top:16px;padding-top:14px;border-top:1px solid #e5e7eb">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
              '<span style="font-weight:bold;color:#4b5563;font-size:0.9em">🗂 קישורים קיימים</span>' +
              '<button id="share-refresh-btn" type="button" style="background:none;border:none;color:#7c3aed;cursor:pointer;font-size:0.85em">🔄 רענן</button>' +
            '</div>' +
            '<div id="share-tokens-list" style="max-height:220px;overflow-y:auto;font-size:0.85em"></div>' +
          '</div>' +
        '</div>';
      document.body.appendChild(overlay);
      var style = document.createElement('style');
      style.textContent = '.ttl-choice{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border:2px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:0.9em} .ttl-choice input{margin-left:4px}';
      document.head.appendChild(style);
      // Wire static buttons once (programmatic — share.html is an IIFE so inline onclick won't resolve).
      document.getElementById('share-close-btn').onclick = closeShareLinkDialog;
      document.getElementById('share-create-btn').onclick = createShareLink;
      document.getElementById('share-result-copy').onclick = copyShareUrl;
      document.getElementById('share-result-wa').onclick = shareOnWhatsApp;
      document.getElementById('share-refresh-btn').onclick = refreshShareTokensList;
      // Delegated wiring for the dynamic existing-tokens list (rebuilt each refresh).
      document.getElementById('share-tokens-list').addEventListener('click', function(e) {
        var b = (e.target && e.target.closest) ? e.target.closest('button[data-act]') : null;
        if (!b) return;
        var act = b.getAttribute('data-act');
        var tok = b.getAttribute('data-tok') || '';
        var cat = b.getAttribute('data-cat') || '';
        if (act === 'copy') _copyTokenUrl(tok);
        else if (act === 'wa') _shareTokenOnWhatsApp(tok, cat);
        else if (act === 'revoke') _revokeShareToken(tok);
      });
    }
    document.getElementById('share-link-cat').textContent = catName;
    document.getElementById('share-link-result').style.display = 'none';
    _skipActiveLinkConfirm = false;
    overlay.style.display = 'block';
    refreshShareTokensList();
  }

  function closeShareLinkDialog() {
    var overlay = document.getElementById('share-link-overlay');
    if (overlay) overlay.style.display = 'none';
  }

  function _renderActiveShareLinkBox() {
    var box = document.getElementById('share-link-existing-active');
    if (!box) return;
    if (!_activeTokenForDialogCat) { box.style.display = 'none'; return; }
    var t = _activeTokenForDialogCat;
    var url = _shareBaseUrl() + 'share.html?t=' + t.token;
    var exp = new Date(t.expires_at * 1000).toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    document.getElementById('share-link-existing-url').textContent = url;
    var metaPrefix = '';
    if (t.owner_name && t.is_mine === false) metaPrefix = 'מאת: ' + t.owner_name + ' · ';
    document.getElementById('share-link-existing-meta').textContent = metaPrefix + 'פג תוקף: ' + exp;
    box.style.display = 'block';
    document.getElementById('share-link-existing-copy').onclick = function() {
      navigator.clipboard.writeText(url).then(function() { showToast('הקישור הועתק ✓'); });
    };
    document.getElementById('share-link-existing-wa').onclick = function() {
      var safeCat = String(t.category || '').replace(/"/g, '');
      var msg = 'שלום! הכינותי קטגוריית מילים' + (safeCat ? ' ("' + safeCat + '")' : '') + ' ואשמח אם תקליט/י את ההגייה: ' + url;
      window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank', 'noopener');
    };
  }

  function refreshShareTokensList() {
    var listEl = document.getElementById('share-tokens-list');
    if (!listEl) return;
    listEl.innerHTML = '<div style="color:#6b7280">טוען...</div>';
    _activeTokenForDialogCat = null;
    _renderActiveShareLinkBox();
    var token = _ownerAuthToken();
    if (!token) { listEl.innerHTML = '<div style="color:#dc2626">לא מחובר</div>'; return; }
    var dialogCat = (document.getElementById('share-link-cat') || {}).textContent || '';
    // share.html lists the owner's own tokens (no BUILTIN_CATEGORIES here, so
    // the communal list_tokens_for_category path isn't used); filtered by cat below.
    fetch('/plonter/api/vocab_share_api.php?action=list_tokens', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }
    }).then(function(r) { return r.json(); }).then(function(j) {
      if (!j.success) { listEl.innerHTML = '<div style="color:#dc2626">' + (j.error || 'שגיאה') + '</div>'; return; }
      if (!j.items || !j.items.length) {
        listEl.innerHTML = '<div style="color:#6b7280;text-align:center;padding:12px">אין קישורים פעילים</div>';
        return;
      }
      var matches = j.items.filter(function(t) {
        return !t.revoked && !t.expired && String(t.category) === String(dialogCat);
      });
      if (matches.length) {
        matches.sort(function(a, b) { return (b.expires_at || 0) - (a.expires_at || 0); });
        _activeTokenForDialogCat = matches[0];
        _renderActiveShareLinkBox();
      }
      var surfacedToken = _activeTokenForDialogCat ? _activeTokenForDialogCat.token : null;
      var filteredItems = surfacedToken
        ? j.items.filter(function(t) { return t.token !== surfacedToken; })
        : j.items;
      if (filteredItems.length === 0 && surfacedToken) {
        listEl.innerHTML = '<div style="font-size:0.85em;color:#9ca3af;text-align:center;padding:8px">אין קישורים נוספים מעבר למוצג למעלה</div>';
        return;
      }
      var html = '';
      filteredItems.forEach(function(t) {
        var status = t.revoked ? '🚫 בוטל' : (t.expired ? '⏰ פג תוקף' : '✅ פעיל');
        var statusColor = t.revoked || t.expired ? '#9ca3af' : '#059669';
        var exp = new Date(t.expires_at * 1000).toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        var lastUsed = t.last_used_at ? new Date(t.last_used_at * 1000).toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit' }) : '—';
        var safeCat = _shareEsc(t.category);
        var safeTok = _shareEsc(t.token);
        var revokeBtn = (!t.revoked && !t.expired)
          ? '<button type="button" data-act="revoke" data-tok="' + safeTok + '" style="padding:4px 8px;background:#fef2f2;color:#dc2626;border:1px solid #dc2626;border-radius:6px;cursor:pointer;font-size:0.8em">🚫 בטל</button>'
          : '';
        html += '<div style="padding:8px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:6px;' + (t.revoked || t.expired ? 'opacity:0.65;' : '') + '">' +
          '<div style="display:flex;justify-content:space-between;gap:6px;align-items:center">' +
            '<span style="font-weight:bold;color:#0d9488">' + safeCat + '</span>' +
            '<span style="color:' + statusColor + ';font-size:0.85em">' + status + '</span>' +
          '</div>' +
          '<div style="font-size:0.8em;color:#6b7280;margin-top:3px">פג: ' + exp + ' · שימוש אחרון: ' + lastUsed + '</div>' +
          (!t.revoked && !t.expired ? '<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">' +
            '<button type="button" data-act="copy" data-tok="' + safeTok + '" style="padding:4px 8px;background:#eff6ff;color:#2563eb;border:1px solid #2563eb;border-radius:6px;cursor:pointer;font-size:0.8em">📋 העתק</button>' +
            '<button type="button" data-act="wa" data-tok="' + safeTok + '" data-cat="' + safeCat + '" style="padding:4px 8px;background:#dcfce7;color:#15803d;border:1px solid #15803d;border-radius:6px;cursor:pointer;font-size:0.8em">💬 וואטסאפ</button>' +
            revokeBtn +
          '</div>' : '') +
        '</div>';
      });
      listEl.innerHTML = html;
    }).catch(function(e) { listEl.innerHTML = '<div style="color:#dc2626">שגיאת רשת</div>'; });
  }

  function _copyTokenUrl(tok) {
    var url = _shareBaseUrl() + 'share.html?t=' + tok;
    navigator.clipboard.writeText(url).then(function() { showToast('הקישור הועתק ✓'); });
  }
  function _openTokenUrl(tok) {
    window.open(_shareBaseUrl() + 'share.html?t=' + tok, '_blank', 'noopener');
  }
  function _shareTokenOnWhatsApp(tok, catName) {
    var url = _shareBaseUrl() + 'share.html?t=' + tok;
    var nameTxt = catName ? ' ("' + catName + '")' : '';
    var msg = 'שלום! הכינותי קטגוריית מילים' + nameTxt + ' ואשמח אם תקליט/י את ההגייה: ' + url;
    window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank', 'noopener');
  }
  function _revokeShareToken(tok) {
    if (!confirm('לבטל את הקישור? אי אפשר לשחזר.')) return;
    var token = _ownerAuthToken();
    fetch('/plonter/api/vocab_share_api.php?action=revoke', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ token: tok })
    }).then(function(r) { return r.json(); }).then(function(j) {
      if (!j.success) { alert('שגיאה: ' + (j.error || '')); return; }
      showToast('הקישור בוטל ✓');
      refreshShareTokensList();
    });
  }

  function createShareLink() {
    // If an active link already exists for this category, confirm before creating another.
    if (_activeTokenForDialogCat && !_skipActiveLinkConfirm) {
      var ta = _activeTokenForDialogCat;
      var aurl = _shareBaseUrl() + 'share.html?t=' + ta.token;
      var cmsg = 'יש כבר קישור פעיל לקטגוריה זו:\n' + aurl + '\n\nליצור קישור חדש בכל זאת?\n(הקיים יישאר פעיל גם אם תיצור חדש; אפשר לבטל אותו ידנית מהרשימה למטה.)';
      if (!confirm(cmsg)) {
        navigator.clipboard.writeText(aurl).then(function() { showToast('הועתק הקישור הקיים ✓'); });
        return;
      }
      _skipActiveLinkConfirm = true;
      try { createShareLink(); } finally { _skipActiveLinkConfirm = false; }
      return;
    }
    var btn = document.getElementById('share-create-btn');
    var catName = _shareDialogCat || (INFO && INFO.category) || CATEGORY_NAME || '';
    var token = _ownerAuthToken();
    var ttlEl = document.querySelector('input[name="share-ttl"]:checked');
    var ttlHours = ttlEl ? parseInt(ttlEl.value, 10) : 24;
    if (btn) { btn.disabled = true; btn.textContent = '⏳ יוצר...'; }
    var body = { category: catName, ttl_hours: ttlHours, words: _shareWordsForCurrentCat() };
    fetch('/plonter/api/vocab_share_api.php?action=create_token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(body)
    }).then(function(r) { return r.json(); }).then(function(j) {
      if (btn) { btn.disabled = false; btn.textContent = '🎤 צור קישור הקלטה'; }
      if (!j.success) { alert('שגיאה: ' + (j.error || 'unknown')); return; }
      var fullUrl = _shareBaseUrl() + j.url;
      _lastShareUrl = fullUrl;
      _lastShareCat = catName || '';
      document.getElementById('share-link-url').textContent = fullUrl;
      document.getElementById('share-link-result').style.display = 'block';
      var exp = new Date(j.expires_at * 1000);
      document.getElementById('share-link-expires').textContent = 'פג תוקף: ' + exp.toLocaleString('he-IL') + ' · ' + j.word_count + ' מילים';
      refreshShareTokensList();
    }).catch(function(e) {
      if (btn) { btn.disabled = false; btn.textContent = '🎤 צור קישור הקלטה'; }
      alert('שגיאת רשת: ' + e.message);
    });
  }

  function copyShareUrl() {
    if (!_lastShareUrl) return;
    navigator.clipboard.writeText(_lastShareUrl).then(function() { showToast('הקישור הועתק ✓'); });
  }
  function shareOnWhatsApp() {
    if (!_lastShareUrl) return;
    var catTxt = _lastShareCat ? ' ("' + _lastShareCat + '")' : '';
    var msg = 'שלום! הכינותי קטגוריית מילים' + catTxt + ' ואשמח אם תקליט/י את ההגייה: ' + _lastShareUrl;
    window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
  }
  function openShareUrl() {
    if (!_lastShareUrl) return;
    window.open(_lastShareUrl, '_blank', 'noopener');
  }
})();
</script>
</body>
</html>
