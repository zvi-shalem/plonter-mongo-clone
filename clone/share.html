<script>
/* === Clone API guard (2026-05-28) ===
   This page is a CLONE deployed under the SAME ORIGIN as the live /plonter/
   site, so it SHARES localStorage (incl. plonter_vocab_v2 and
   plonter_auth_token). It must NEVER hit /plonter/clone/api/ (the clone's
   api/ has empty DBs) — a failed/guest auth there can wipe the real user's
   vocab. App code already targets the absolute /plonter/api/; this is a
   belt-and-braces net that re-routes any stray same-origin api/ call to the
   LIVE backend. No-op for calls already under /plonter/api/. */
(function () {
    var LIVE = '/plonter/api/';
    function fix(u) {
        try {
            if (typeof u !== 'string' || !u) return u;
            var abs = new URL(u, document.baseURI);
            if (abs.origin !== location.origin) return u;             // cross-origin: leave
            if (abs.pathname.indexOf('/plonter/api/') === 0) return u; // already live: leave
            var m = abs.pathname.match(/\/api\/(.*)$/);
            if (!m) return u;                                          // not an api call
            return LIVE + m[1] + abs.search + abs.hash;
        } catch (e) { return u; }
    }
    if (window.fetch) {
        var _f = window.fetch;
        window.fetch = function (input, init) {
            if (typeof input === 'string') return _f.call(this, fix(input), init);
            return _f.call(this, input, init);
        };
    }
    var _o = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function (method, url) {
        try { arguments[1] = fix(url); } catch (e) {}
        return _o.apply(this, arguments);
    };
})();
</script>

  .grand-celebration-sub {
    margin-top: 12px; font-size: clamp(1rem, 3.5vw, 1.7rem);
    color: #ecfeff; font-weight: 800;
  }
  .grand-confetti {
    position: fixed; top: -20px; width: 11px; height: 18px; border-radius: 3px;
    z-index: 10005; pointer-events: none;
    animation: grand-confetti-fall var(--dur) linear forwards;
  }
  .grand-firework {
    position: fixed; width: 10px; height: 10px; border-radius: 999px;
    z-index: 10005; pointer-events: none; background: white;
    box-shadow: 0 0 16px currentColor;
    animation: grand-firework-pop 0.92s ease-out forwards;
  }
  @keyframes grand-title-pop {
    0% { opacity: 0; transform: scale(0.68) rotate(-2deg); }
    65% { opacity: 1; transform: scale(1.08) rotate(1deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes grand-celebration-fade {
    0%, 78% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes grand-confetti-fall {
    0% { opacity: 1; transform: translate3d(0, -30px, 0) rotate(0deg); }
    100% { opacity: 0; transform: translate3d(var(--drift), 110vh, 0) rotate(var(--rot)); }
  }
  @keyframes grand-firework-pop {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(0.2); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.35); }
  }
  @keyframes enc-confetti-fly {
    0%   { opacity: 1; transform: translate(-50%, -50%) rotate(0deg) scale(1); }
    100% { opacity: 0;
           transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)) scale(0.7); }
  }
</style>
</head>
<body>
<div class="wrap">
  <div id="main"></div>
  <div id="toast" class="toast"></div>
</div>

<script>
(function() {
  var qs = new URLSearchParams(location.search);
  var TOKEN = qs.get('t') || qs.get('token') || '';
  var TARGET_WORD = qs.get('word') || qs.get('target_word') || '';
  var TARGET_IDX = qs.get('idx') || qs.get('target_idx') || '';
  var TARGET_LANG = qs.get('lang') || '';
  var URL_RECORDER_NAME = qs.get('name') || '';
  var main = document.getElementById('main');
  var toast = document.getElementById('toast');

  function showToast(msg, ms) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, ms || 2200);
  }

  // Random-color pill + confetti burst as a "כל הכבוד" to the teacher after
  // each recording (Amitai 2026-04-24 16:41). Non-blocking: pointer-events off,
  // auto-fades, stacks if multiple fire back-to-back.
  var _ENC_PALETTE = [
    '#0d9488', // teal
    '#0891b2', // cyan
    '#8b5cf6', // violet
    '#ec4899', // pink
    '#f59e0b', // amber
    '#22c55e', // green
    '#6366f1', // indigo
    '#ef4444'  // red
  ];
  var _ENC_CONFETTI_COLORS = ['#fbbf24', '#f87171', '#34d399', '#60a5fa', '#c084fc', '#fb7185', '#a3e635'];
  function _encPickColor() { return _ENC_PALETTE[Math.floor(Math.random() * _ENC_PALETTE.length)]; }
  function _encSpawnConfetti(count) {
    for (var i = 0; i < count; i++) {
      var p = document.createElement('span');
      p.className = 'enc-confetti';
      var angle = Math.random() * 2 * Math.PI;
      var dist  = 80 + Math.random() * 80;
      p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      p.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
      p.style.background = _ENC_CONFETTI_COLORS[Math.floor(Math.random() * _ENC_CONFETTI_COLORS.length)];
      p.style.animationDelay = (Math.random() * 0.1) + 's';
      document.body.appendChild(p);
      setTimeout((function(el) { return function() { if (el.parentNode) el.parentNode.removeChild(el); }; })(p), 1300);
    }
  }
  function showEncouragement(msg) {
    var b = document.createElement('div');
    b.className = 'enc-bubble';
    b.textContent = msg;
    b.style.background = 'linear-gradient(135deg,' + _encPickColor() + ',' + _encPickColor() + ')';
    document.body.appendChild(b);
    _encSpawnConfetti(12);
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { b.classList.add('show'); });
    });
    setTimeout(function() {
      b.classList.remove('show');
      b.classList.add('fade');
      setTimeout(function() { if (b.parentNode) b.parentNode.removeChild(b); }, 400);
    }, 1400);
  }
  var _ENC_PHRASES = [
    'תודה!', 'אין עליך!', 'יופי!', 'כל הכבוד!', 'מעולה!',
    'ממשיך חזק!', 'אלוף!', 'עבודה נהדרת!', 'וואו!', 'נשמע מצוין!',
    'כבוד גדול!', 'פצצה!', 'קדימה!', 'אש!', 'מקצוענות טהורה!'
  ];
  var _ENC_USED = {};
  // Cooldown counter: fire a random phrase every 2..5 uploads (Amitai
  // 2026-04-25 00:30 "כל 2-5 מילים"). Milestones (25/50/75) bypass cooldown.
  function _encRandomInterval() { return 2 + Math.floor(Math.random() * 4); } // 2..5
  var _encCooldown = _encRandomInterval();
  function _pickEncouragement(pct, done, total) {
    // Milestones take priority at 25/50/75 (fire once each). These bypass cooldown.
    if (pct >= 75 && !_ENC_USED.m75) { _ENC_USED.m75 = true; return 'כמעט שם — ' + pct + '%!'; }
    if (pct >= 50 && !_ENC_USED.m50) { _ENC_USED.m50 = true; return 'חצי דרך! ' + pct + '%'; }
    if (pct >= 25 && !_ENC_USED.m25) { _ENC_USED.m25 = true; return pct + '% שם!'; }
    // First recording — always "תודה".
    if (done === 1) { _encCooldown = _encRandomInterval(); return 'תודה!'; }
    // Decrement and check: only fire when cooldown hits 0, then reset.
    _encCooldown--;
    if (_encCooldown > 0) return null;
    _encCooldown = _encRandomInterval();
    var pool = _ENC_PHRASES.filter(function(p) { return p !== _ENC_USED._last; });
    var pick = pool[Math.floor(Math.random() * pool.length)];
    _ENC_USED._last = pick;
    return pick;
  }

  var _grandCelebrationActive = false;
  function _spawnGrandFirework(cx, cy, pieces) {
    for (var i = 0; i < pieces; i++) {
      var s = document.createElement('span');
      s.className = 'grand-firework';
      var a = (Math.PI * 2 * i / pieces) + (Math.random() * 0.22);
      var d = 58 + Math.random() * 130;
      var color = _ENC_CONFETTI_COLORS[Math.floor(Math.random() * _ENC_CONFETTI_COLORS.length)];
      s.style.left = cx + 'px';
      s.style.top = cy + 'px';
      s.style.color = color;
      s.style.background = color;
      s.style.setProperty('--dx', Math.cos(a) * d + 'px');
      s.style.setProperty('--dy', Math.sin(a) * d + 'px');
      document.body.appendChild(s);
      setTimeout((function(el) { return function() { if (el.parentNode) el.parentNode.removeChild(el); }; })(s), 1100);
    }
  }
  function _showGrandArabicCelebration(onDone) {
    if (_grandCelebrationActive) { if (onDone) onDone(); return; }
    _grandCelebrationActive = true;
    var overlay = document.createElement('div');
    overlay.className = 'grand-celebration';
    overlay.innerHTML = '<div class="grand-celebration-title">פיצוץ! 🎉<div class="grand-celebration-sub">כל הערבית הוקלטה</div></div>';
    document.body.appendChild(overlay);
    for (var i = 0; i < 150; i++) {
      var c = document.createElement('span');
      c.className = 'grand-confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = _ENC_CONFETTI_COLORS[Math.floor(Math.random() * _ENC_CONFETTI_COLORS.length)];
      c.style.setProperty('--dur', (2.0 + Math.random() * 1.8) + 's');
      c.style.setProperty('--drift', ((Math.random() * 260) - 130) + 'px');
      c.style.setProperty('--rot', ((Math.random() * 980) - 490) + 'deg');
      c.style.animationDelay = (Math.random() * 0.7) + 's';
      document.body.appendChild(c);
      setTimeout((function(el) { return function() { if (el.parentNode) el.parentNode.removeChild(el); }; })(c), 4400);
    }
    var fw = setInterval(function() {
      _spawnGrandFirework(60 + Math.random() * (window.innerWidth - 120), 80 + Math.random() * Math.min(360, window.innerHeight * 0.5), 18);
    }, 260);
    setTimeout(function() {
      clearInterval(fw);
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
      _grandCelebrationActive = false;
      if (onDone) onDone();
    }, 3500);
  }

  function renderError(msg) {
    main.innerHTML = '<div class="error-box">' + msg + '</div>';
  }

  // Native recording bridge callbacks (Android app). Assigned BEFORE the no-token
  // early return so they are always present when MainActivity invokes them. They
  // reference hoisted function declarations and read NREC at call time. Amitai 2026-05-24.
  window.__onNativeRecComplete = function(b64, mime) {
    var ctx = NREC; NREC = null;
    _nrecCleanupUI(ctx);
    if (!ctx || ctx.cancelled) return;
    try {
      var bin = atob(b64); var len = bin.length;
      var bytes = new Uint8Array(len);
      for (var i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
      var blob = new Blob([bytes], { type: mime || 'audio/mp4' });
      uploadClip(blob, ctx.wordKey, ctx.btn, ctx.rowEl);
    } catch (e) { showToast('שגיאה בעיבוד ההקלטה', 3000); }
  };
  window.__onNativeRecError = function(code) {
    var ctx = NREC; NREC = null;
    _nrecCleanupUI(ctx);
    _showMicPermissionHelp({ name: code || 'native_error' }, function() {
      if (ctx) openNativeRecPanel(ctx.rowEl, ctx.wordKey, ctx.btn);
    });
  };

  if (!TOKEN) return renderError('חסר טוקן בכתובת. בקשו את הקישור מחדש.');

  function fmtRemaining(secs) {
    if (secs >= 86400) return Math.floor(secs / 86400) + ' ימים';
    if (secs >= 3600) return Math.floor(secs / 3600) + ' שעות';
    if (secs >= 60) return Math.floor(secs / 60) + ' דקות';
    return secs + ' שניות';
  }

  function loadInfo() {
    fetch('/plonter/api/vocab_share_api.php?action=info&t=' + encodeURIComponent(TOKEN))
      .then(function(r) { return r.json(); })
      .then(function(j) {
        if (!j.success) return renderError(j.error || 'שגיאה בטעינה');
        if (j.group === true || j.is_group === true) {
          IS_GROUP        = true;
          GROUP_NAME      = j.group_name || '';
          GROUP_REMAINING = parseInt(j.remaining_seconds, 10) || 0;
          CATEGORIES      = (j.categories || []).map(function(c) {
            return {
              name: c.name || '',
              words: c.words || [],
              existing_keys: c.existing_keys || [],
              existing_by_lang: c.existing_by_lang || { ar: (c.existing_keys || []), he: [] },
              existing_names_by_lang: c.existing_names_by_lang || { ar: {}, he: {} },
              expires_at: j.expires_at,
              remaining_seconds: GROUP_REMAINING
            };
          });
          showGroupGate();
        } else {
          showGate(j);
        }
      })
      .catch(function(e) { renderError('שגיאת רשת: ' + e.message); });
  }

  // Group-mode name-gate. Same as showGate but flows into the picker on submit.
  function showGroupGate() {
    var cached = '';
    try { cached = localStorage.getItem(NAME_KEY) || URL_RECORDER_NAME || localStorage.getItem(GLOBAL_NAME_KEY) || ''; } catch (_) {}
    if (cached) {
      try { localStorage.setItem(NAME_KEY, cached); localStorage.setItem(GLOBAL_NAME_KEY, cached); } catch (_) {}
      NAME_CACHED = cached;
      return renderGroupPicker();
    }

    main.innerHTML =
      '<header><h1>הקלטה משותפת — ' + escapeHtml(GROUP_NAME) + '</h1>' +
        '<div class="meta">' + CATEGORIES.length + ' סורות · פג תוקף בעוד ' + fmtRemaining(GROUP_REMAINING) + '</div>' +
      '</header>' +
      '<div class="card name-gate">' +
        '<label for="rec-name">איך לקרוא לך? (רק כדי שלא נסתבך)</label>' +
        '<input id="rec-name" type="text" placeholder="שם / כינוי" maxlength="40">' +
        '<br><button class="btn-primary" id="rec-go">המשך</button>' +
      '</div>';

    var input = document.getElementById('rec-name');
    var btn   = document.getElementById('rec-go');
    input.focus();
    function go() {
      var v = input.value.trim();
      if (!v) { input.focus(); return; }
      try { localStorage.setItem(NAME_KEY, v); localStorage.setItem(GLOBAL_NAME_KEY, v); } catch (_) {}
      NAME_CACHED = v;
      renderGroupPicker();
    }
    btn.onclick = go;
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') go(); });
  }

  // Render the group picker — one card per category, tap to enter recording.
  // Inject the highlight-next animation CSS once. Bounce + pulsing border
  // for ~5s, then settles back to normal. Pointer-events kept :auto on the
  // animating element so taps pass through (spec point 7).
  var _GRP_HIGHLIGHT_CSS_INJECTED = false;
  function _injectGroupHighlightCss() {
    if (_GRP_HIGHLIGHT_CSS_INJECTED) return;
    _GRP_HIGHLIGHT_CSS_INJECTED = true;
    var s = document.createElement('style');
    // Darker card surfaces; green is reserved for the progress fill.
    // Incomplete cards get a clear blue focus tint, completed cards stay
    // neutral/slate. The first incomplete card keeps bouncing until it is
    // completed, then the class moves to the next incomplete card on render.
    s.textContent =
      '@keyframes grpCardBounce { 0%,100%{transform:translateY(0) scale(1)} 18%{transform:translateY(-7px) scale(1.025)} 36%{transform:translateY(0) scale(0.995)} 54%{transform:translateY(-4px) scale(1.015)} 72%{transform:translateY(0) scale(1)} }' +
      '@keyframes grpCardPulse  { 0%,100%{border-color:#7dd3fc;box-shadow:0 0 0 4px rgba(125,211,252,0.24),0 8px 22px rgba(15,23,42,0.18)} 50%{border-color:#22d3ee;box-shadow:0 0 0 6px rgba(34,211,238,0.25),0 10px 26px rgba(15,23,42,0.22)} }' +
      '.group-cat-card{background:#334155;color:#e2e8f0;transition:background-color 0.15s,transform 0.05s,border-color 0.15s,box-shadow 0.15s}' +
      '.group-cat-card:nth-of-type(odd){background:#2f3f52}' +
      '.group-cat-card.todo{background:#1e3a5f}' +
      '.group-cat-card.todo:nth-of-type(odd){background:#1d4d6f}' +
      '.group-cat-card:hover{background:#25607c}' +
      '.group-cat-card.done{background:#475569}' +
      '.group-cat-card.done:nth-of-type(odd){background:#405064}' +
      '.group-cat-card .cat-title{color:#bfdbfe}' +
      '.group-cat-card.done .cat-title{color:#a7f3d0}' +
      '.group-cat-card .cat-ratio{color:#dbeafe}' +
      '.group-cat-card .cat-meta{color:#cbd5e1}' +
      '.group-cat-card .cat-progress-track{background:#1e293b}' +
      '.group-cat-card .cat-progress-fill{background:linear-gradient(90deg,#bbf7d0,#4ade80)}' +
      '.group-cat-card.highlight-next{' +
        'animation:grpCardBounce 1.05s ease-in-out infinite, grpCardPulse 1.55s ease-in-out infinite;' +
        'border-color:#7dd3fc!important;' +
        'box-shadow:0 0 0 4px rgba(125,211,252,0.24),0 8px 22px rgba(15,23,42,0.20)!important;' +
        'pointer-events:auto;' +
      '}';
    document.head.appendChild(s);
  }

  // Track first-ever picker render so re-renders (after upload, after back)
  // re-bounce but don't re-scroll (spec point 6).
  var _PICKER_EVER_RENDERED = false;

  function renderGroupPicker() {
    CURRENT_CAT_OBJ = null;  // back to picker = no current cat
    _injectGroupHighlightCss();

    // First-incomplete computation — Arabic-only definition per spec:
    // a cat is COMPLETE iff every word's arabic is present in
    // existing_by_lang.ar. Hebrew side does NOT count.
    var firstIncompleteIdx = -1;
    for (var ci = 0; ci < CATEGORIES.length; ci++) {
      var c0 = CATEGORIES[ci];
      var ws = c0.words || [];
      if (ws.length === 0) continue;  // empty cat — skip, spec point 5 corollary
      var arSet0 = {}; (c0.existing_by_lang.ar || []).forEach(function(k) { arSet0[k] = true; });
      var allArDone = ws.every(function(w) { return arSet0[w.arabic || '']; });
      if (!allArDone) { firstIncompleteIdx = ci; break; }
    }

    var cardsHtml = CATEGORIES.map(function(cat, idx) {
      var total = (cat.words || []).length;
      var arSet = {}; (cat.existing_by_lang.ar || []).forEach(function(k) { arSet[k] = true; });
      var heSet = {}; (cat.existing_by_lang.he || []).forEach(function(k) { heSet[k] = true; });
      // "Done" = either-language recording exists for that word. Mirrors the
      // most permissive sense of "this word has audio." Per-lang counts shown
      // small underneath.
      var doneAny = (cat.words || []).filter(function(w) {
        var k = w.arabic || ''; return arSet[k] || heSet[k];
      }).length;
      var arDone = (cat.existing_by_lang.ar || []).length;
      var heDone = (cat.existing_by_lang.he || []).length;
      var pct = total ? Math.round((doneAny / total) * 100) : 0;
      var allDone = total > 0 && doneAny === total;
      var isHighlight = (idx === firstIncompleteIdx);
      return (
        '<button type="button" class="group-cat-card' + (allDone ? ' done' : ' todo') + (isHighlight ? ' highlight-next' : '') + '" data-idx="' + idx + '" ' +
                'style="text-align:right;border:2px solid ' + (allDone ? '#64748b' : '#38bdf8') + ';' +
                'border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;width:100%;' +
                'box-shadow:0 2px 8px rgba(15,23,42,0.16);font-family:inherit;display:block">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">' +
            '<span class="cat-title" style="font-size:1.08em;font-weight:bold">' + escapeHtml(cat.name) + (allDone ? ' ✓' : '') + '</span>' +
            '<span class="cat-ratio" style="font-size:0.85em">' + doneAny + ' / ' + total + '</span>' +
          '</div>' +
          '<div class="cat-progress-track" style="height:7px;border-radius:4px;overflow:hidden;margin-top:8px">' +
            '<div class="cat-progress-fill" style="height:100%;width:' + pct + '%;transition:width 0.3s"></div>' +
          '</div>' +
          '<div class="cat-meta" style="margin-top:6px;font-size:0.78em">ערבית: ' + arDone + ' · עברית: ' + heDone + ' · ' + pct + '%</div>' +
        '</button>'
      );
    }).join('');

    main.innerHTML =
      '<header style="position:relative">' +
        '<h1>הקלטה משותפת — ' + escapeHtml(GROUP_NAME) + '</h1>' +
        '<div class="meta">שלום ' + escapeHtml(NAME_CACHED) + ' · פג תוקף בעוד ' + fmtRemaining(GROUP_REMAINING) + '</div>' +
      '</header>' +
      '<div class="card" style="padding:14px 16px;text-align:center">' +
        '<div style="font-weight:bold;color:#0d9488;font-size:1.05em;margin-bottom:4px">בחר קטגוריה להקלטה</div>' +
        '<div style="font-size:0.88em;color:#6b7280">' + CATEGORIES.length + ' קטגוריות זמינות בקבוצה זו</div>' +
      '</div>' +
      cardsHtml;

    main.querySelectorAll('.group-cat-card').forEach(function(b) {
      b.onclick = function() {
        var idx = parseInt(b.getAttribute('data-idx'), 10);
        if (isNaN(idx) || !CATEGORIES[idx]) return;
        selectGroupCategory(CATEGORIES[idx]);
      };
    });

    // Spec point 4 — scroll only on FIRST picker render. Subsequent
    // renders (e.g. user tapped back from a recording view) only re-bounce
    // via the CSS class; no scroll-jolt.
    if (firstIncompleteIdx >= 0 && !_PICKER_EVER_RENDERED) {
      _PICKER_EVER_RENDERED = true;
      setTimeout(function() {
        var card = main.querySelector('.group-cat-card[data-idx="' + firstIncompleteIdx + '"]');
        if (card && card.scrollIntoView) {
          try { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (_) {}
        }
      }, 300);
    }
    if (_PICKER_EVER_RENDERED === false && firstIncompleteIdx === -1) {
      // First render with no incomplete cards — flag so subsequent renders
      // (triggered by upload) can still skip the scroll if a now-incomplete
      // card appears (defensive: shouldn't happen, but keeps "first scroll
      // only" promise consistent).
      _PICKER_EVER_RENDERED = true;
    }
  }

  function selectGroupCategory(cat) {
    CURRENT_CAT_OBJ = cat;
    // Build a single-cat info-shape that renderList can consume. Share the
    // existing_by_lang array references so uploadClip's mirror push (line in
    // uploadClip) flows back into CATEGORIES[idx].existing_by_lang and the
    // picker shows fresh counts on return without a re-fetch.
    var synth = {
      category: cat.name,
      words: cat.words || [],
      existing_keys: cat.existing_by_lang.ar || [],
      existing_by_lang: cat.existing_by_lang,
      existing_names_by_lang: cat.existing_names_by_lang || { ar: {}, he: {} },
      expires_at: cat.expires_at,
      remaining_seconds: cat.remaining_seconds
    };
    renderList(synth, NAME_CACHED);
    setTimeout(function() {
      _showTutorial(function() { setTimeout(_scrollToNextUnrecorded, 200); });
    }, 120);
  }

  // Name-gate: ask for recipient name once, cached per-token in localStorage.
  var NAME_KEY = 'plonter_share_name_' + TOKEN;
  var GLOBAL_NAME_KEY = 'plonter_share_name_global';
  var CATEGORY_NAME = '';
  var _celebShown = false;
  // Bilingual support (Amitai 2026-04-24 15:45): recordings are per language.
  // Default tab is Arabic; Hebrew is opt-in via the tab switcher.
  var LANG = (TARGET_LANG === 'he') ? 'he' : 'ar';
  var INFO = null;                    // last loaded info (for tab switching re-render)
  var NAME_CACHED = '';               // recipient display name
  var _hebrewPromptShown = false;     // "finished Arabic — add Hebrew?" dialog fires once

  // Group-share state (Plonter TODO #633, 2026-05-02). When IS_GROUP is true the
  // token covers multiple categories; the user picks one from a grid first and
  // the recording flow becomes scoped to CURRENT_CAT_OBJ.
  var IS_GROUP = false;
  var GROUP_NAME = '';
  var GROUP_REMAINING = 0;
  var CATEGORIES = [];                // [{name, words, existing_keys, existing_by_lang}, ...]

  function showGate(info) {
    var cached = '';
    try { cached = localStorage.getItem(NAME_KEY) || URL_RECORDER_NAME || localStorage.getItem(GLOBAL_NAME_KEY) || ''; } catch (_) {}
    if (cached) {
      try { localStorage.setItem(NAME_KEY, cached); localStorage.setItem(GLOBAL_NAME_KEY, cached); } catch (_) {}
      return renderList(info, cached);
    }

    main.innerHTML =
      '<header><h1>הקלטה משותפת</h1>' +
        '<div class="meta">קטגוריה: ' + escapeHtml(info.category) + ' · פג תוקף בעוד ' + fmtRemaining(info.remaining_seconds) + '</div>' +
      '</header>' +
      '<div class="card name-gate">' +
        '<label for="rec-name">איך לקרוא לך? (רק כדי שלא נסתבך)</label>' +
        '<input id="rec-name" type="text" placeholder="שם / כינוי" maxlength="40">' +
        '<br><button class="btn-primary" id="rec-go">המשך</button>' +
      '</div>';

    var input = document.getElementById('rec-name');
    var btn = document.getElementById('rec-go');
    input.focus();
    function go() {
      var v = input.value.trim();
      if (!v) { input.focus(); return; }
      try { localStorage.setItem(NAME_KEY, v); localStorage.setItem(GLOBAL_NAME_KEY, v); } catch (_) {}
      renderList(info, v);
      setTimeout(function() {
        _showTutorial(function() {
          setTimeout(function() {
            if (!_scrollToTargetWord()) _scrollToNextUnrecorded();
          }, 200);
        });
      }, 120);
    }
    btn.onclick = go;
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') go(); });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  function _wordHasRecordingInLang(wordKey, lang) {
    if (!INFO || !INFO.existing_by_lang || !INFO.existing_by_lang[lang]) return false;
    return INFO.existing_by_lang[lang].indexOf(wordKey) !== -1;
  }

  function _recButtonStatus(wordKey) {
    var hasAr = _wordHasRecordingInLang(wordKey, 'ar');
    var hasHe = _wordHasRecordingInLang(wordKey, 'he');
    if (hasAr) return { cls: 'done', title: hasHe ? 'הוקלט בערבית ובעברית — הקלט מחדש' : 'הוקלט בערבית — הקלט מחדש' };
    if (hasHe) return { cls: 'partial-he', title: 'יש רק הקלטה בעברית — חסרה ערבית' };
    return { cls: '', title: 'הקלטה' };
  }

  function _applyRecButtonStatus(btn, wordKey) {
    if (!btn) return;
    var st = _recButtonStatus(wordKey);
    btn.classList.remove('done', 'partial-he');
    if (st.cls) btn.classList.add(st.cls);
    btn.title = st.title;
  }

  function _wireReturnLinkCompact() {
    var link = document.getElementById('app-return-link');
    if (!link || !TARGET_WORD) return;
    function update() {
      if (window.scrollY > 42) link.classList.add('return-compact');
      else link.classList.remove('return-compact');
    }
    window.removeEventListener('scroll', _wireReturnLinkCompact._handler || function(){});
    _wireReturnLinkCompact._handler = update;
    window.addEventListener('scroll', update, { passive: true });
    update();
  }

  function renderList(info, name) {
    INFO = info;
    NAME_CACHED = name;
    CATEGORY_NAME = info.category || '';

    // existing_by_lang is the new shape; existing_keys kept as ar fallback
    // for any older server versions hit during a deploy race.
    var byLang = info.existing_by_lang || { ar: (info.existing_keys || []), he: [] };
    var existing = {};
    (byLang[LANG] || []).forEach(function(k) { existing[k] = true; });
    var namesByLang = info.existing_names_by_lang || {};
    var recorderNames = namesByLang[LANG] || {};

    var catLabel = LANG === 'he' ? 'עברית' : 'ערבית';
    var returnMode = '';
    try { returnMode = (new URLSearchParams(location.search || '').get('return') || '').toLowerCase(); } catch (_) {}

    var appLinkText = _returnToEdit ? '↩ חזור לעריכת הקטגוריה' : (TARGET_WORD ? '↩ חזור לקטגוריה' : '📚 כנס לאוצם פלונטר');
    var guideStyle = _prominentBack
      ? 'position:absolute;top:62px;left:14px;background:rgba(15,23,42,0.82);color:white;border:1px solid rgba(255,255,255,0.35);border-radius:10px;padding:7px 13px;font-family:inherit;font-size:0.82em;font-weight:bold;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,0.22)'

    }
    html += '<header style="position:relative">' +
      '<button id="guide-btn" type="button" style="' + guideStyle + '">📖 מדריך למשתמש</button>' +
      // Plonter task #23 (2026-04-29) — secondary link to the main app,

      '<a id="app-return-link" href="' + appLinkHref + '" style="' + appLinkStyle + '">' + appLinkText + '</a>' +
      '<h1 style="padding-left:140px">הקלטה משותפת — ' + escapeHtml(info.category) + '</h1>' +

    var remS = parseInt(info.remaining_seconds, 10) || 0;

      '<button type="button" class="lang-tab' + (LANG==='he'?' active':'') + '" data-lang="he" role="tab">🇮🇱 עברית <span class="lang-tab-hint">(תשובות)</span></button>' +
    '</div>';

    if (!info.words || !info.words.length) {

      html += '<div id="progress-card" class="card" style="padding:12px 14px">' +

          '<span style="font-size:0.85em;color:#6b7280" id="progress-pct">' + pct + '%</span>' +
        '</div>' +
        '<div style="height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden">' +
          '<div id="progress-bar" style="height:100%;background:linear-gradient(90deg,#0d9488,#059669);width:' + pct + '%;transition:width 0.3s"></div>' +
        '</div>' +
        '<div id="progress-celebrate" style="display:' + (doneW === totalW && totalW > 0 ? 'block' : 'none') + ';text-align:center;margin-top:10px;padding:14px 10px;background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-radius:8px;color:#065f46;font-weight:bold">' +
          '<div style="font-size:1.05em">🎉 הושלם! ' + (LANG==='he'?'הקלטת את כל המילים בעברית':'הקלטת את כל המילים בערבית') + '</div>' +
          '<a id="play-cat-link" href="#" target="_blank" rel="noopener" style="display:inline-block;margin-top:10px;padding:11px 22px;background:linear-gradient(135deg,#0d9488,#0891b2);color:white;text-decoration:none;border-radius:10px;font-weight:bold;font-size:0.98em;box-shadow:0 3px 10px rgba(13,148,136,0.3)">🎮 לשחק בקטגוריה</a>' +
        '</div>' +
        '<div style="text-align:center;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">' +
          '<button id="play-from-current-btn" type="button" title="נגן רציף מהכפתור הנוכחי — לחץ שוב לעצירה">▶ נגן רציף מהכפתור הנוכחי</button>' +
          '<button id="seq-speed-btn-top" type="button" title="מהירות השמעה — לחץ לסבב 1× / 1.5× / 2×">×1</button>' +
        '</div>' +
      '</div>';
      var instruction = LANG === 'he'
        ? 'לחצו על 🎤 ליד כל מילה כדי להקליט אותה בעברית. זה בונוס — לא חובה.'
        : 'לחצו על 🎤 כדי להקליט את המילה בערבית. הקלטה חדשה מחליפה את הקיימת.';
      html += '<div class="card" style="padding:10px 12px"><div style="font-size:0.9em;color:#6b7280;text-align:center">' + instruction + '</div></div>';
      if (TARGET_WORD) {
        html += '<div class="card" style="padding:12px 14px;text-align:center">' +
          '<div style="font-size:0.95em;font-weight:bold;color:#0d9488;margin-bottom:8px">רוצה שעוד אנשים יקליטו? שתף!</div>' +
          '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">' +
            '<button id="target-share-copy-btn" type="button" style="padding:9px 14px;background:#eff6ff;color:#2563eb;border:1.5px solid #2563eb;border-radius:9px;cursor:pointer;font-family:inherit;font-weight:bold">📋 העתק קישור</button>' +
            '<button id="target-share-wa-btn" type="button" style="padding:9px 14px;background:#25D366;color:white;border:none;border-radius:9px;cursor:pointer;font-family:inherit;font-weight:bold">💬 וואטסאפ</button>' +
          '</div>' +
        '</div>';
      }
      info.words.forEach(function(w, i) {
        var wordKey = (w.arabic || '');
        var hasRec = !!existing[wordKey];
        var recStatus = _recButtonStatus(wordKey);
        var recorderName = hasRec ? (recorderNames[wordKey] || '') : '';
        var recorderLabel = hasRec ? (recorderName ? ('הוקלט ע״י ' + recorderName) : 'הוקלט ע״י לא ידוע') : '';
        // Active language gets the big primary slot; the OTHER language is
        // shown small + gray + in parens beside it (Amitai 2026-04-25 22:43,
        // reversing the 04-24 16:45 "active-only" rule). AR mode → arabic
        // big + (hebrew) gray; HE mode → hebrew big + (arabic) gray. The
        // word-form (Arabic plural / preposition) stays in its slot — it's
        // already small + gray and serves as the "addition" line.
        var primary = LANG === 'he' ? escapeHtml(w.hebrew || '') : escapeHtml(w.arabic || '');
        var secondary = LANG === 'he' ? escapeHtml(w.arabic || '') : escapeHtml(w.hebrew || '');
        // In AR-recording mode (Amitai 2026-04-27 17:34): put form in the middle
        // (right after arabic) and hebrew-translation on the left. HE-recording
        // mode keeps the original order (hebrew big → (arabic) → form).
        var midSlots = (LANG === 'he')
          ? ((secondary ? '<span class="word-secondary">(' + secondary + ')</span>' : '') +
             '<span class="word-form">' + escapeHtml(w.form || '') + '</span>')
          : ('<span class="word-form">' + escapeHtml(w.form || '') + '</span>' +
             (secondary ? '<span class="word-secondary">(' + secondary + ')</span>' : ''));
        html += '<div class="word-row" data-key="' + escapeHtml(wordKey) + '" data-idx="' + i + '">' +
          '<span class="word-num">' + (i + 1) + '.</span>' +
          '<span class="word-ar">' + primary + '</span>' +
          midSlots +
          (hasRec ? '<button class="play-btn" data-action="play" title="השמע הקלטה קיימת">▶️</button>' : '') +
          (hasRec ? '<span class="recording-owner" title="' + escapeHtml(recorderLabel) + '">🎙 ' + escapeHtml(recorderName || 'לא ידוע') + '</span>' : '') +
          '<button class="rec-btn' + (recStatus.cls ? ' ' + recStatus.cls : '') + '" data-action="rec" title="' + escapeHtml(recStatus.title) + '">🎤</button>' +
          (hasRec ? '<span class="has-recording-badge" title="יש הקלטה קיימת">✓</span>' : '') +
        '</div>';
      });
      // Footer "switch language" button — Amitai 2026-04-26 07:27. Lets the
      // teacher flip languages without scrolling back to the top tabs.
      var otherLang = LANG === 'he' ? 'ar' : 'he';
      var otherLangLabel = otherLang === 'he' ? 'עברית' : 'ערבית';
      html += '<div class="swap-lang-footer">' +
        '<span class="swap-lang-hint">סיימת את ה' + (LANG === 'he' ? 'עברית' : 'ערבית') + '? אפשר להקליט גם ב-' + otherLangLabel + '</span>' +
        '<button id="swap-lang-footer-btn" type="button">🔄 עבור ל' + otherLangLabel + '</button>' +
      '</div>';
    }

    main.innerHTML = html;
    _wireReturnLinkCompact();

    var backBtn = document.getElementById('back-to-group-btn');
    if (backBtn) backBtn.onclick = function() {
      // Stop any in-flight playback/recording before bouncing the DOM.
      if (typeof SEQ_PLAY !== 'undefined' && SEQ_PLAY) { try { _stopSequencePlay(); } catch (_) {} }
      try { closePlayerPanel(); } catch (_) {}
      if (REC) { try { REC.cancelled = true; REC.rec.stop(); } catch (_) {} }
      renderGroupPicker();

    var guideBtn = document.getElementById('guide-btn');
    if (guideBtn) guideBtn.onclick = function() { _showTutorial(); };
    var ownerShareBtn = document.getElementById('owner-share-access-btn');
    if (ownerShareBtn) ownerShareBtn.onclick = function() {
      var cat = (INFO && INFO.category) || CATEGORY_NAME || '';
      if (!cat) { showToast('לא נמצאה קטגוריה'); return; }
      // Open the share-link dialog IN-PAGE as an overlay (no navigation to
      // vocab.html, which used to flash the home screen first — Amitai
      // 2026-05-24). See INPAGE_SHARE_DIALOG_20260524 below.
      openShareLinkDialog(cat);
    };
    var targetShareUrl = location.origin + location.pathname.replace(/[^\/]*$/, '') + 'share.html?t=' + encodeURIComponent(TOKEN);
    var targetShareCopyBtn = document.getElementById('target-share-copy-btn');
    if (targetShareCopyBtn) targetShareCopyBtn.onclick = function() {
      navigator.clipboard.writeText(targetShareUrl).then(function() { showToast('הקישור הועתק ✓'); });

    var targetShareWaBtn = document.getElementById('target-share-wa-btn');
    if (targetShareWaBtn) targetShareWaBtn.onclick = function() {

        SEQ_SPEED = _SEQ_SPEED_STEPS[(i + 1) % _SEQ_SPEED_STEPS.length];
        speedBtnTop.textContent = _formatSpeed(SEQ_SPEED);
        if (PLAYER && PLAYER.audio) { try { PLAYER.audio.playbackRate = SEQ_SPEED; } catch (_) {} }
      };
    }
    // Sole start/stop button for sequence playback (Amitai 2026-04-26 07:21
    // + 07:22: removed "השמע הכל ברצף" entirely; this button is now the only

    var playFromCurBtn = document.getElementById('play-from-current-btn');
    if (playFromCurBtn) {
      playFromCurBtn.onclick = function() {
        if (SEQ_PLAY) { _stopSequencePlay(); showToast('נעצר'); }
        else _startSequencePlayFromCurrent();

      // Re-sync label/style to whichever state we're in (handles re-renders

      _syncPlayFromCurBtn();
    }
    var swapBtn = document.getElementById('swap-lang-footer-btn');
    if (swapBtn) swapBtn.onclick = function() { switchLang(LANG === 'he' ? 'ar' : 'he'); };
    // Initial render: place the floating jump-to-last-unrecorded button.
    setTimeout(_updateJumpToNextBtn, 80);

    main.querySelectorAll('.lang-tab').forEach(function(tab) {
      tab.onclick = function() { switchLang(tab.getAttribute('data-lang')); };
    });

    main.querySelectorAll('.word-row').forEach(function(row) {
      var key = row.getAttribute('data-key');
      var recBtn = row.querySelector('.rec-btn');
      if (recBtn) recBtn.onclick = function(e) {
        e.stopPropagation();
        row.classList.remove('highlight-next');
        _markLastTouched(row);
        if (NREC && NREC.btn === recBtn) {
          if (NREC.countingDown) return;
          if (NREC.stop) NREC.stop();
          return;
        }
        if (REC && REC.btn === recBtn) {
          if (REC.countingDown) return;
          try { REC.rec.stop(); } catch (_) {}
          return;
        }
        var hasRec = !!row.querySelector('.play-btn');
        if (hasRec) _confirmOverwrite(row, key, recBtn, function() { openRecPanel(row, key, recBtn); });
        else openRecPanel(row, key, recBtn);
      };
      var playBtn = row.querySelector('.play-btn');
      if (playBtn) playBtn.onclick = function(e) { e.stopPropagation(); row.classList.remove('highlight-next'); _markLastTouched(row); openPlayerPanel(row, key); };
      row.style.cursor = 'pointer';
      row.onclick = function(e) {
        if (e.target.closest('button')) return;
        // While THIS row is being recorded, tapping anywhere on it ends the

        // BOTH the browser path (REC) and the native app path (NREC). Amitai
        // 2026-04-24 16:44; native (NREC) branch added 2026-05-24 — it was

          openPlayerPanel(row, key);
        } else {
          var rb = row.querySelector('.rec-btn');
          if (rb) {
            if (REC && REC.btn === rb) { try { REC.rec.stop(); } catch (_) {} return; }
            openRecPanel(row, key, rb);

    var rowsNow = document.querySelectorAll('.word-row');

  function _scrollToTargetWord() {
    if (!TARGET_WORD) return false;

          indexedTarget.classList.add('highlight-next');

  function _findFirstUnrecordedRow() {

    var btn = document.getElementById('jump-to-next-unrec-btn');

    if (SEQ_PLAY) {
      if (btn) btn.style.display = 'none';

        t.classList.add('highlight-next');

  // Sequence-play variant that starts from a chosen index (Amitai 2026-04-25
  // 22:37 "מהמילה הנוכחית"). Uses the last-touched row as the starting point;
  // falls back to first-row-in-viewport, then to the start.
  function _startSequencePlayFrom(startRowEl) {
    _stopSequencePlay();
    closePlayerPanel();
    if (REC) { showToast('סיים את ההקלטה קודם'); return; }
    var rows = [];
    document.querySelectorAll('.word-row').forEach(function(r) {
      if (r.querySelector('.play-btn')) rows.push(r);
    });
    if (!rows.length) { showToast('אין הקלטות להשמעה רציפה'); return; }
    var startIdx = 0;
    if (startRowEl) {
      var directIdx = rows.indexOf(startRowEl);
      if (directIdx >= 0) {
        startIdx = directIdx;
      } else {
        // startRowEl has no recording (not in rows). Pick the first row that
        // comes AFTER it in DOM order; if none, fall back to start.
        for (var i = 0; i < rows.length; i++) {
          var pos = startRowEl.compareDocumentPosition(rows[i]);
          if (pos & Node.DOCUMENT_POSITION_FOLLOWING) { startIdx = i; break; }
        }
      }
    }
    SEQ_PLAY = { rows: rows, idx: startIdx, stopped: false };
    _renderSeqStopBtn();
    _seqPlayNext();
  }
  function _startSequencePlayFromCurrent() {
    var anchor = _getLastTouchedRow();
    if (!anchor) {
      // Fallback: first row whose top is currently inside the viewport.
      var rows = document.querySelectorAll('.word-row');
      for (var i = 0; i < rows.length; i++) {
        var r = rows[i].getBoundingClientRect();
        if (r.bottom > 0 && r.top < (window.innerHeight || 800)) { anchor = rows[i]; break; }
      }
    }
    _startSequencePlayFrom(anchor);
  }

  // ---- Recorder ----
  var REC = null; // { rec, chunks, stream, panelEl, startedAt, pausedMs, lastPauseAt, cancelled, rowEl }

  function pickMime() {
    var cands = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/ogg', 'audio/mp4'];
    if (!window.MediaRecorder || !MediaRecorder.isTypeSupported) return '';
    for (var i = 0; i < cands.length; i++) if (MediaRecorder.isTypeSupported(cands[i])) return cands[i];
    return '';
  }

  function fmtMs(ms) {
    var s = Math.max(0, Math.floor(ms / 1000));
    var mm = Math.floor(s / 60); var ss = s % 60;
    return mm + ':' + (ss < 10 ? '0' + ss : ss);
  }

  // Reverted persistent-stream cache after Amitai 10:50 reported doubled audio;
  // simple pending flag prevents concurrent startup races instead.
  var _recPending = false;
  var _micRetried = false;  // one-shot auto-retry guard for NotReadableError (mic busy)
  var _activeMicStream = null;  // last acquired mic stream, force-released before each new attempt
  // Native recording bridge (Android app, window.AndroidRec). When present we record
  // via Android's MediaRecorder instead of getUserMedia, which fails (NotReadableError)
  // on some device WebViews. Amitai 2026-05-24. Browser users are unaffected.
  var NATIVE_REC = !!(window.AndroidRec && window.AndroidRec.startRecording);
  var NREC = null;
  function _showMicPermissionHelp(err, retryFn) {
    var old = document.getElementById('mic-permission-help');
    if (old && old.parentNode) old.parentNode.removeChild(old);
    var code = (err && (err.name || err.message)) ? String(err.name || err.message) : '';
    var helpUrl = location.href;  // same url used by the copy/open actions below
    // Detect the Android WebView wrapper (the app). Default WebView UA contains "; wv".
    // In newer APKs window.AndroidRec.openExternalUrl opens the same page in the
    // real browser, so this prompt can offer a direct site button instead of only
    // a copy-link fallback. (Amitai 2026-05-25.)
    var isApp = navigator.userAgent.indexOf('; wv') !== -1;
    // NotReadableError/AbortError = the OS granted the mic but couldn't START it
    // (something else is holding it: media playback, a call, another recorder).
    // This is NOT a permission problem, so we show a "mic busy" message and never
    // offer a "go to website" route. (Amitai 2026-05-24, screenshot showed
    // NotReadableError while media was playing.)
    var isBusy = code && /NotReadable|Abort|NotFound|Overconstrained/i.test(code);

  function openRecPanel(rowEl, wordKey, btn, attempt) {

    try { document.querySelectorAll('audio').forEach(function(a) { try { a.pause(); } catch (_) {} }); } catch (_) {}

        '<span style="font-size:0.75em;color:#9ca3af">/ 0:30</span>' +
        '<span style="flex:1"></span>' +
        '<button type="button" class="ap-btn" data-a="cancel" title="בטל">✕</button>';

  // ---- Continuous-play sequence (teacher-side QA) ----
  var SEQ_PLAY = null;

  function _startSequencePlay() {

    // 2026-04-25 00:19 "כל דבר שמפעיל שמע — הנגן הפעיל נעצר").

    var rows = [];
    document.querySelectorAll('.word-row').forEach(function(r) {
      if (r.querySelector('.play-btn')) rows.push(r);
    });
    if (!rows.length) { showToast('אין הקלטות להשמעה רציפה'); return; }
    SEQ_PLAY = { rows: rows, idx: 0, stopped: false };
    _renderSeqStopBtn();
    _seqPlayNext();

  function _seqPlayNext() {
    if (!SEQ_PLAY || SEQ_PLAY.stopped) return;
    if (SEQ_PLAY.idx >= SEQ_PLAY.rows.length) {
      _stopSequencePlay();
      showToast('🎉 סיום ההשמעה הרציפה');
      return;
    }
    var row = SEQ_PLAY.rows[SEQ_PLAY.idx];
    var key = row.getAttribute('data-key');
    document.querySelectorAll('.word-row.seq-current').forEach(function(r) { r.classList.remove('seq-current'); });
    row.classList.add('seq-current');
    try { row.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (_) {}
    openPlayerPanel(row, key);
    setTimeout(function() {
      if (!PLAYER || !PLAYER.audio || !SEQ_PLAY || SEQ_PLAY.stopped) return;
      var audio = PLAYER.audio;
      try { audio.playbackRate = SEQ_SPEED; } catch (_) {}
      audio.addEventListener('ended', function _onEnd() {
        try { audio.removeEventListener('ended', _onEnd); } catch (_) {}
        if (!SEQ_PLAY || SEQ_PLAY.stopped) return;
        SEQ_PLAY.idx++;
        setTimeout(_seqPlayNext, 450);
      });
    }, 120);
  }

    if (SEQ_PLAY) {

      b.classList.add('is-stop');
    } else {
      b.textContent = '▶ נגן רציף מהכפתור הנוכחי';
      b.classList.remove('is-stop');
    }
  }

  function _renderSeqStopBtn() {
    // Hide the floating "↑ למילה הבאה להקליט" arrow while a sequence plays
    // (Amitai 2026-04-26 07:19). The top button itself flips to "עצור" via
    // _syncPlayFromCurBtn (no separate fixed-bottom stop button anymore).
    _syncPlayFromCurBtn();

    if (jb) jb.style.display = 'none';
