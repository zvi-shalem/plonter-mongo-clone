<VirtualHost *:80>
    DocumentRoot /var/www/html

    DirectoryIndex index.html index.php

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # -----------------------------------------------------------------------
    # Reproduce the LIVE path layout: on the live server EVERY PHP API is served
    # from /plonter/api/, including content_api.php + content_share_api.php (which
    # live under sharing/ in the repo) and media_api.php (repo root).
    #
    # We rewrite those three /plonter/api/<name>.php URLs to their physical files.
    # Internal rewrite preserves each script's __DIR__, so its relative
    # require_once('../vendor'|'../mongo_adapter') / ('vendor'|'mongo_adapter')
    # paths keep resolving against /plonter/ — no PHP source change needed.
    #
    # The real api/*.php files already sit physically at /plonter/api/, so any
    # other /plonter/api/<name>.php request is served directly with no rewrite.
    # -----------------------------------------------------------------------
    RewriteEngine On
    RewriteRule ^/plonter/api/content_api\.php$        /plonter/sharing/content_api.php        [PT,L,QSA]
    RewriteRule ^/plonter/api/content_share_api\.php$  /plonter/sharing/content_share_api.php  [PT,L,QSA]
    RewriteRule ^/plonter/api/media_api\.php$          /plonter/media_api.php                  [PT,L,QSA]

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
