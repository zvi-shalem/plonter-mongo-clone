; Plonter media-warehouse upload limits.
; Mirrors api/.user.ini — but mod_php (used by php:8.2-apache) does NOT process
; per-directory .user.ini files (those are CGI/FPM-only), so the limits are set
; globally here via conf.d instead.
upload_max_filesize = 64M
post_max_size = 68M
memory_limit = 128M
max_execution_time = 300
max_input_time = 300
